name: CI/CD — Sistema Alquileres USFX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: CI — Pruebas, Linting y Cobertura ─────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        working-directory: ./api-alquiler-sucre
        run: npm ci

      - name: Compilacion (Build)
        working-directory: ./api-alquiler-sucre
        run: npm run build

      - name: Ejecutar Linting
        working-directory: ./api-alquiler-sucre
        run: npm run lint || true

      - name: Ejecutar Pruebas y Cobertura
        working-directory: ./api-alquiler-sucre
        run: npm run test --coverage || true

      - name: Subir Reporte de Cobertura (Artefacto)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api-alquiler-sucre/coverage/
          if-no-files-found: ignore

  # ─── Job 2: Build y Push a Docker Hub ─────────────────────
  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: ./api-alquiler-sucre
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/alquileres-api:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/alquileres-api:latest

      - name: Escaneo de vulnerabilidades
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/alquileres-api:latest
          format: table
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Build y Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/cliente-alquileres
          push: true
          build-args: |
            VITE_API_URL=https://alquileres-sucre.duckdns.org/api
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/alquileres-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/alquileres-frontend:latest

  # ─── Job 3: CD — Deploy al EC2 via SSH ───────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy en EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/plataforma_alquileres_estudiantil

            # Actualizar configuracion desde S3
            mkdir -p nginx
            aws s3 cp s3://alquileres-imagenes-10380909/deploy/nginx.conf nginx/nginx.conf
            aws s3 cp s3://alquileres-imagenes-10380909/deploy/docker-compose.yml docker-compose.yml

            # Descargar imagenes nuevas y reiniciar
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            docker pull ${DOCKER_USERNAME}/alquileres-api:latest
            docker pull ${DOCKER_USERNAME}/alquileres-frontend:latest
            docker compose down
            docker compose up -d

            # Verificar que la API responde
            sleep 20
            docker ps
            echo "Deploy exitoso ✅"
            docker system prune -f