
services:

  # ─── Base de datos PostgreSQL ─────────────────────────────
  
  # ─── API NestJS ───────────────────────────────────────────
  api:
    image: ${DOCKER_USERNAME}/alquileres-api:latest
    container_name: alquileres-api
    restart: unless-stopped
    env_file:
      - .env                # carga todas las variables del .env raíz
    ports:
      - "3001:3000"
    volumes:
      - vol-uploads:/app/uploads   # imágenes de inmuebles y comprobantes
    networks:
      - red-alquileres

  # ─── Frontend React (Nginx) ───────────────────────────────
  frontend:
    image: ${DOCKER_USERNAME}/alquileres-frontend:latest
    container_name: alquileres-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - red-alquileres

# ─── Volúmenes ────────────────────────────────────────────────
volumes:
  vol-uploads:
    name: vol-uploads        # imágenes subidas por propietarios

# ─── Red interna ──────────────────────────────────────────────
networks:
  red-alquileres:
    name: red-alquileres    # los contenedores se comunican por nombre
