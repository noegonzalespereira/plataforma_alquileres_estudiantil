name: CI/CD — Sistema Alquileres USFX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: CI — Pruebas, Linting y Cobertura ─────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        working-directory: ./api-alquiler-sucre
        run: npm ci

      - name: Compilacion (Build)
        working-directory: ./api-alquiler-sucre
        run: npm run build

      - name: Ejecutar Linting
        working-directory: ./api-alquiler-sucre
        run: npm run lint || true

      - name: Ejecutar Pruebas y Cobertura
        working-directory: ./api-alquiler-sucre
        run: npm run test --coverage || true

      - name: Subir Reporte de Cobertura (Artefacto)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api-alquiler-sucre/coverage/
          if-no-files-found: ignore

  # ─── Job 2: Build y Push a Docker Hub ─────────────────────
  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: ./api-alquiler-sucre
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/alquileres-api:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/alquileres-api:latest

      - name: Escaneo de vulnerabilidades
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/alquileres-api:latest
          format: table
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Build y Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/cliente-alquileres
          push: true
          build-args: |
            VITE_API_URL=http://52.4.135.83:3001
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/alquileres-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/alquileres-frontend:latest

  # ─── Job 3: CD — Deploy al EC2 via SSM (sin SSH) ──────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy en EC2 via SSM
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=ec2-alquileres" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          echo "Desplegando en instancia: $INSTANCE_ID"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd ~/plataforma_alquileres_estudiantil",
              "docker pull ${{ secrets.DOCKER_USERNAME }}/alquileres-api:latest",
              "docker pull ${{ secrets.DOCKER_USERNAME }}/alquileres-frontend:latest",
              "export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}",
              "docker compose down",
              "docker compose up -d",
              "sleep 30",
              "if curl -sf http://localhost:3001/health; then echo Deploy exitoso; else echo Health check fallo — rollback; docker compose down; docker compose up -d; exit 1; fi",
              "docker system prune -f"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # Esperar resultado
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          # Obtener output y status
          RESULT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID")

          STATUS=$(echo $RESULT | python3 -c "import sys,json; print(json.load(sys.stdin)['Status'])")
          OUTPUT=$(echo $RESULT | python3 -c "import sys,json; print(json.load(sys.stdin)['StandardOutputContent'])")
          ERROR=$(echo $RESULT | python3 -c "import sys,json; print(json.load(sys.stdin)['StandardErrorContent'])")

          echo "=== OUTPUT ==="
          echo "$OUTPUT"
          echo "=== ERRORES ==="
          echo "$ERROR"
          echo "=== STATUS: $STATUS ==="

          if [ "$STATUS" != "Success" ]; then
            echo "Deploy falló ❌"
            exit 1
          fi
          echo "Deploy exitoso ✅"