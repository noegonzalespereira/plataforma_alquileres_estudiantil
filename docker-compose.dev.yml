services:

  api:
    build:
      context: ./api-alquiler-sucre
    container_name: alquileres-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3001:3000"
    volumes:
      - vol-uploads:/app/uploads
    networks:
      - red-alquileres

  frontend:
    build:
      context: ./frontend/cliente-alquileres
      args:
        VITE_API_URL: http://52.4.135.83:3001
    container_name: alquileres-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - red-alquileres

volumes:
  vol-uploads:
    name: vol-uploads

networks:
  red-alquileres:
    name: red-alquileres