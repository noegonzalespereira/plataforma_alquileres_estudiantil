name: CI/CD — Sistema Alquileres USFX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: CI — Build y pruebas ──────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push — API
        uses: docker/build-push-action@v5
        with:
          context: ./api-alquiler-sucre
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/alquileres-api:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/alquileres-api:latest

      - name: Build y Push — Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/cliente-alquileres
          push: true
          build-args: |
            VITE_API_URL=http://52.4.135.83:3001
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/alquileres-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/alquileres-frontend:latest

  # ─── Job 2: CD — Deploy al EC2 ────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy en EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/plataforma_alquileres_estudiantil

            # Pull de las nuevas imágenes
            docker pull ${{ secrets.DOCKER_USERNAME }}/alquileres-api:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/alquileres-frontend:latest

            # Actualizar docker-compose para usar imágenes de Docker Hub
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

            # Reiniciar contenedores con las nuevas imágenes
            docker compose down
            docker compose up -d

            # Health check
            sleep 10
            curl -sf http://localhost:3001/health && echo "Deploy exitoso ✅" || echo "Health check falló ❌"

            # Limpiar imágenes antiguas
            docker system prune -f