name: CI/CD — Sistema Alquileres USFX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: CI — Pruebas, Linting y Cobertura ─────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        working-directory: ./api-alquiler-sucre
        run: npm ci

      - name: Compilacion (Build)
        working-directory: ./api-alquiler-sucre
        run: npm run build

      - name: Ejecutar Linting
        working-directory: ./api-alquiler-sucre
        run: npm run lint || true

      - name: Ejecutar Pruebas y Cobertura
        working-directory: ./api-alquiler-sucre
        run: npm run test --coverage || true

      - name: Subir Reporte de Cobertura (Artefacto)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api-alquiler-sucre/coverage/
          if-no-files-found: ignore

  # ─── Job 2: Build y Push a Docker Hub ─────────────────────
  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: ./api-alquiler-sucre
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/alquileres-api:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/alquileres-api:latest

      - name: Escaneo de vulnerabilidades
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/alquileres-api:latest
          format: table
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Build y Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/cliente-alquileres
          push: true
          build-args: |
            VITE_API_URL=https://alquileres-sucre.duckdns.org/api
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/alquileres-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/alquileres-frontend:latest

  # ─── Job 3: CD — Deploy al EC2 via SSM (sin SSH) ──────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Subir archivos de configuracion a S3
        run: |
          aws s3 cp nginx/nginx.conf s3://alquileres-imagenes-10380909/deploy/nginx.conf
          aws s3 cp docker-compose.yml s3://alquileres-imagenes-10380909/deploy/docker-compose.yml

      - name: Deploy en EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --targets "Key=tag:Name,Values=ec2-alquileres" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd ~/plataforma_alquileres_estudiantil",
              "mkdir -p nginx",
              "aws s3 cp s3://alquileres-imagenes-10380909/deploy/nginx.conf nginx/nginx.conf",
              "aws s3 cp s3://alquileres-imagenes-10380909/deploy/docker-compose.yml docker-compose.yml",
              "export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}",
              "docker pull ${DOCKER_USERNAME}/alquileres-api:latest",
              "docker pull ${DOCKER_USERNAME}/alquileres-frontend:latest",
              "docker compose down",
              "docker compose up -d",
              "sleep 30",
              "curl -sf http://localhost:3001/health && echo Deploy exitoso || (echo Health check fallo; exit 1)",
              "docker system prune -f"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # Polling manual
          for i in {1..20}; do
            sleep 10

            STATUSES=$(aws ssm list-command-invocations \
              --command-id "$COMMAND_ID" \
              --query "CommandInvocations[*].Status" \
              --output text 2>/dev/null || echo "Pending")

            echo "Intento $i — Statuses: $STATUSES"

            if echo "$STATUSES" | grep -qE "InProgress|Pending|Delayed"; then
              continue
            fi

            if echo "$STATUSES" | grep -qE "Failed|TimedOut|Cancelled"; then
              echo "Deploy falló ❌"
              aws ssm list-command-invocations \
                --command-id "$COMMAND_ID" \
                --details \
                --query "CommandInvocations[*].{Instance:InstanceId,Status:Status,Output:CommandPlugins[0].Output}" \
                --output table
              exit 1
            fi

            if echo "$STATUSES" | grep -v -qE "InProgress|Pending|Delayed|Failed|TimedOut|Cancelled"; then
              echo "Deploy exitoso ✅"
              exit 0
            fi
          done

          echo "Timeout esperando el deploy ❌"
          exit 1