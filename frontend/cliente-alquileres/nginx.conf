server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Habilitar gzip para archivos JS/CSS (carga más rápida)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # SPA routing: cualquier ruta que no sea un archivo estático
    # devuelve index.html para que React Router la maneje
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets de Vite (tienen hash en el nombre)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
