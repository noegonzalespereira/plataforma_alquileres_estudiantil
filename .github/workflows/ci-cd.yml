name: CI/CD — Sistema Alquileres USFX

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: CI — Pruebas, Linting y Cobertura ─────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        working-directory: ./api-alquiler-sucre
        run: npm ci

      - name: Compilacion (Build)
        working-directory: ./api-alquiler-sucre
        run: npm run build

      - name: Ejecutar Linting
        working-directory: ./api-alquiler-sucre
        run: npm run lint || true

      - name: Ejecutar Pruebas y Cobertura
        working-directory: ./api-alquiler-sucre
        run: npm run test --coverage || true

      - name: Subir Reporte de Cobertura (Artefacto)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api-alquiler-sucre/coverage/
          if-no-files-found: ignore

  # ─── Job 2: Build y Push a Docker Hub ─────────────────────
  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: ./api-alquiler-sucre
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/alquileres-api:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/alquileres-api:latest

      - name: Escaneo de vulnerabilidades
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/alquileres-api:latest
          format: table
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Build y Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/cliente-alquileres
          push: true
          build-args: |
            VITE_API_URL=http://52.4.135.83:3001
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/alquileres-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/alquileres-frontend:latest

  # ─── Job 3: CD — Deploy al EC2 ────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy en EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/plataforma_alquileres_estudiantil

            # Pull nuevas imágenes
            docker pull ${{ secrets.DOCKER_USERNAME }}/alquileres-api:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/alquileres-frontend:latest

            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

            # Health check ANTES del deploy (guarda versión actual)
            CURRENT_SHA=$(docker inspect alquileres-api --format='{{.Image}}' 2>/dev/null || echo "none")

            # Deploy
            docker compose down
            docker compose up -d

            # Espera y health check
            sleep 15
            if curl -sf http://localhost:3001/health; then
              echo "Deploy exitoso ✅"
            else
              echo "Health check falló — ejecutando rollback ❌"
              docker compose down
              docker pull ${{ secrets.DOCKER_USERNAME }}/alquileres-api:${{ github.sha }}
              docker compose up -d
              echo "Rollback completado"
              exit 1
            fi

            # Limpiar imágenes antiguas
            docker system prune -f