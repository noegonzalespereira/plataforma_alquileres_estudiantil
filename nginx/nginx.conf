events {
    worker_connections 1024;
}

http {
    # Permitir hasta 20 MB por request (fotos de inmuebles)
    client_max_body_size 20M;

    # Redirigir HTTP → HTTPS
    server {
        listen 80;
        server_name alquileres-sucre.duckdns.org;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name alquileres-sucre.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/alquileres-sucre.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/alquileres-sucre.duckdns.org/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # API NestJS
        location /api/ {
            proxy_pass         http://api:3000/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts generosos para uploads
            proxy_read_timeout    120s;
            proxy_connect_timeout 120s;
            proxy_send_timeout    120s;
        }

        # Frontend React
        location / {
            proxy_pass         http://frontend:80/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
